<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.css">
</head>
<body>

<div class="container">

    <div class="search">
        <input id="city" type="text" placeholder="Enter city name" autocomplete="off">
        <button id="btn">
            <i class="fa fa-search"></i>
        </button>
    </div>

    <div class="weather">
        <h1 class="temp">--°C</h1>
        <h2 class="city">City Name</h2>

        <div class="details">
            <div class="col">
                <div>
                    <p class="humidity">--%</p>
                    <p>Humidity</p>
                </div>
            </div>
            <div class="col">
                <div>
                    <p class="wind">-- km/h</p>
                    <p>Wind Speed</p>
                </div>
            </div>
        </div>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
